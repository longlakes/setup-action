name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify dist is committed and up to date
        run: |
          git diff --exit-code dist/index.js || \
            (echo "dist/index.js is out of date — run npm run build and commit" && exit 1)
